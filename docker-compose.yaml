services:
  # The Workspace Orchestrator (where the dev actually codes)
  devcontainer:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    volumes:
      - .:/workspaces:cached
    command: sleep infinity

  # Backend
  flask-backend:
    build:
      context: ./services/backend
      dockerfile: Dockerfile
      target: flask-backend-dev
    volumes:
      - ./services/backend:/app:cached
    environment:
      - FLASK_ENV=development
    ports:
      - 5000:5000

  # Frontend
  react-frontend:
    build:
      context: ./services/frontend
      dockerfile: Dockerfile
      target: react-frontend-dev
    volumes:
      - ./services/frontend:/app:cached
      - /app/node_modules # Prevents local node_modules from overriding container
    ports:
      - 5173:5173
    environment:
      - CHOKIDAR_USEPOLLING=true # Ensures hot-reloading works on Windows/Mac/Linux alike

